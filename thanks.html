<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias | Vic &amp; Cris</title>
  <meta name="description" content="Gracias por confirmar asistencia a la boda de Vic &amp; Cris.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&amp;family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&amp;family=Great+Vibes&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
</head>
<body class="page-thanks theme-light">
  <div class="texture-overlay" aria-hidden="true"></div>

  <main class="thanks-shell">
    <div class="thanks-media">
      <video class="door-video" id="doorVideo" autoplay muted loop playsinline poster="assets/poster.jpg">
        <source src="assets/door.mp4" type="video/mp4">
      </video>
      <div class="thanks-overlay"></div>
      <div class="dust-layer dust-layer-thanks" id="thanksDust" aria-hidden="true"></div>
      <div class="magic-flare" id="magicFlare" aria-hidden="true"></div>
    </div>

    <section class="thanks-card" data-reveal>
      <p class="section-kicker">Gracias por confirmar</p>
      <h1>Nos vemos pronto</h1>
      <p class="thanks-date" id="eventDateLabelThanks">Sábado, 12 de septiembre de 2026 · 17:00</p>

      <div class="actions-row actions-centered">
        <a class="btn btn-primary" id="addCalendarBtn" href="#" target="_blank" rel="noopener">Añadir a Google Calendar</a>
        <a class="btn btn-secondary" href="index.html">Volver a la invitación</a>
      </div>
    </section>
  </main>
</body>
</html>
